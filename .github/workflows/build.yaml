name: Build and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/gobaconstructions-github-actions-argocd-on-minikube:${{ github.sha }} .

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/gobaconstructions-github-actions-argocd-on-minikube:${{ github.sha }}

    - name: Update deployment image
      run: |
        sed -i "s|image:.*|image: ${{ secrets.DOCKER_USERNAME }}/gobaconstructions-github-actions-argocd-on-minikube:${{ github.sha }}|" k8s/deployment.yaml

    - name: Commit updated deployment
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add k8s/deployment.yaml

        git commit -m "Update image to ${{ github.sha }}" || echo "No changes"

        git push

