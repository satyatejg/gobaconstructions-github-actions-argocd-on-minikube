apiVersion: apps/v1
kind: Deployment

metadata:
  name: static-site

spec:
  replicas: 2

  selector:
    matchLabels:
      app: static-site

  template:
    metadata:
      labels:
        app: static-site

    spec:
      containers:
      - name: website
        image: fedsatya/gobaconstructions-github-actions-argocd-on-minikube:8b7718dbc0a5bdee5bbc38a114bca83f65731cab
        ports:
        - containerPort: 80
